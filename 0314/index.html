<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Games Arcade</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">AI Games Arcade</div>
    <div class="search-container">
      <input type="text" class="search-input" id="searchInput" placeholder="Search games...">
    </div>
    <button class="upload-btn" id="uploadBtn">Upload Game</button>
  </nav>

  <main class="main-content">
    <h2 class="section-title">Popular Games</h2>
    <div class="game-grid" id="gameGrid"></div>
  </main>

  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Upload Your Game</h3>
        <button class="close-btn" id="closeUpload">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Game Name</label>
          <input type="text" class="form-input" id="gameName" placeholder="Enter game name">
        </div>
        
        <div class="form-group">
          <label class="form-label">Game Thumbnail (Image)</label>
          <div class="file-input-wrapper">
            <input type="file" id="thumbnailFileInput" accept="image/*">
            <div class="file-input-text">Click to upload Thumbnail</div>
            <div class="file-name" id="thumbnailFileName"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Game File (.html only for now)</label>
          <div class="file-input-wrapper">
            <input type="file" id="gameFileInput" accept=".html">
            <div class="file-input-text">Click to upload HTML game</div>
            <div class="file-name" id="gameFileName"></div>
          </div>
        </div>
        <button class="submit-btn" id="submitGame">Launch Game</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="playerModal">
    <div class="modal player-modal">
      <div class="player-header">
        <h3 class="player-title" id="playerTitle">Game Title</h3>
        <div class="header-actions">
          <button class="fullscreen-btn" id="fullscreenBtn">전체화면</button>
          <button class="close-btn" id="closePlayer">&times;</button>
        </div>
      </div>
      <div class="game-frame-container">
        <iframe id="gameFrame" sandbox="allow-scripts allow-pointer-lock allow-same-origin allow-modals" allowfullscreen frameborder="0"></iframe>
        
        <div id="placeholder" class="game-placeholder">
          <p>Loading game...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
