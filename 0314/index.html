<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Games Arcade</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>장르 / 카테고리</h3>
      <button class="close-btn" id="closeSidebar">&times;</button>
    </div>
    <ul class="genre-list" id="genreList"></ul>
  </aside>

  <nav class="navbar">
    <div class="nav-left">
      <div class="hamburger" id="menuBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </div>
      <div class="logo" id="homeLogo" style="cursor: pointer;">AI Games Arcade</div>
    </div>
    
    <div class="search-container" id="searchContainer">
      <input type="text" class="search-input" id="searchInput" placeholder="Search games...">
    </div>
    
    <div class="nav-right" style="display: flex; gap: 1rem; align-items: center;">
      <!-- ✨ userInfo에 cursor:pointer를 추가하여 클릭할 수 있게 만듦 -->
      <div id="userInfo" style="display: none; color: #a78bfa; font-weight: bold; cursor: pointer;" title="내 프로필 보기"></div>
      <button class="upload-btn" id="loginBtn" style="background: #24292e;">GitHub Login</button>
      <button class="upload-btn" id="uploadBtn" style="display: none;">Upload Game</button>
      <button class="upload-btn" id="logoutBtn" style="display: none; background: #3b2d5a;">Logout</button>
    </div>
  </nav>

  <!-- 기존 메인 화면 (id 추가) -->
  <main class="main-content" id="mainContent">
    <h2 class="section-title" id="sectionTitle">Popular Games</h2>
    <div class="game-grid" id="gameGrid"></div>
  </main>

<!-- 프로필 화면 -->
  <main class="main-content" id="profileContent" style="display: none;">
    
    <!-- 프로필 요약 카드 -->
    <div class="profile-header-card">
      <div class="profile-avatar-container">
        <!-- 깃허브 프사가 자동으로 들어갑니다 -->
        <img id="profileAvatar" src="https://via.placeholder.com/100" alt="Profile Avatar" class="profile-avatar">
      </div>
      <div class="profile-info-summary">
        <h2 id="profileDisplayName" class="profile-display-name">게이머</h2>
        <p class="profile-email" id="profileEmail">user@example.com</p>
        
        <!-- 내 통계 요약 -->
        <div class="profile-stats">
          <div class="stat-box">
            <span class="stat-value" id="statTotalGames">0</span>
            <span class="stat-label">업로드한 게임</span>
          </div>
          <div class="stat-box">
            <span class="stat-value" id="statTotalViews">0</span>
            <span class="stat-label">총 누적 조회수</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 설정 카드 -->
    <div class="profile-settings-card">
      <h3 class="settings-title">⚙️ 프로필 설정</h3>
      <div class="form-group">
        <label class="form-label">Display Name (내 마음대로 닉네임 설정)</label>
        <div style="display: flex; gap: 10px; max-width: 400px;">
          <input type="text" class="form-input" id="profileNameInput" placeholder="새로운 닉네임 입력">
          <button class="upload-btn" id="saveProfileBtn">저장하기</button>
        </div>
        <p style="font-size: 0.8rem; color: #a78bfa; margin-top: 8px;">* 여기서 설정한 닉네임은 다시 로그인해도 영구적으로 유지됩니다.</p>
      </div>
    </div>

    <h2 class="section-title" style="margin-top: 3rem;">내가 업로드한 게임</h2>
    <div class="game-grid" id="myGameGrid"></div>
  </main>

  <!-- 업로드 모달 -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Upload Your Game</h3>
        <button class="close-btn" id="closeUpload">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Game Name</label><input type="text" class="form-input" id="gameName"></div>
        <div class="form-group"><label class="form-label">Tags (쉼표로 구분)</label><input type="text" class="form-input" id="gameTags"></div>
        <div class="form-group"><label class="form-label">Game Thumbnail</label><div class="file-input-wrapper"><input type="file" id="thumbnailFileInput" accept="image/*"><div class="file-name" id="thumbnailFileName"></div></div></div>
        <div class="form-group"><label class="form-label">Game File (.html)</label><div class="file-input-wrapper"><input type="file" id="gameFileInput" accept=".html"><div class="file-name" id="gameFileName"></div></div></div>
        <button class="submit-btn" id="submitGame">Launch Game</button>
      </div>
    </div>
  </div>

  <!-- ✨ 게임 정보 수정 모달 (파일은 제외하고 이름과 태그만 빠르고 안전하게 수정) -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Edit Game Info</h3>
        <button class="close-btn" id="closeEdit">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Game Name</label><input type="text" class="form-input" id="editGameName"></div>
        <div class="form-group"><label class="form-label">Tags (쉼표로 구분)</label><input type="text" class="form-input" id="editGameTags"></div>
        <button class="submit-btn" id="submitEditGame">저장하기</button>
      </div>
    </div>
  </div>

  <!-- 게임 플레이어 모달 -->
  <div class="modal-overlay" id="playerModal">
    <div class="modal player-modal">
      <div class="player-header">
        <h3 class="player-title" id="playerTitle">Game Title</h3>
        <div class="header-actions">
          <button class="delete-game-btn" id="deleteGameBtn" style="display: none;">삭제하기</button>
          <button class="fullscreen-btn" id="fullscreenBtn">전체화면</button>
          <button class="close-btn" id="closePlayer">&times;</button>
        </div>
      </div>
      <div class="game-frame-container">
        <iframe id="gameFrame" sandbox="allow-scripts allow-pointer-lock allow-same-origin allow-modals" allowfullscreen frameborder="0"></iframe>
        <div id="placeholder" class="game-placeholder"><p>Loading game...</p></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
